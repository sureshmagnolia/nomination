<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GVC College Union Election</title>
  <script>
    // GitHub Pages SPA redirect hack — sends all 404s back to index.html with the path preserved in the hash
    var l = window.location;
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) + l.hash);
  </script>
</head>
<body></body>
</html>
